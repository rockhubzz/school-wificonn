# Optional reverse proxy.
# The captive portal endpoints (/api/captive, /api/login, /api/denied) MUST be
# reachable over plain HTTP — captive-portal detection won't trigger TLS
# warnings on every OS. Admin UI can use TLS via a second server block.

server {
    listen 80;
    server_name wifi-controller;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

